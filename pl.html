<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stock P&L Calculator</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stock P&L">
  <meta name="theme-color" content="#0f0c29">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23302b63' width='100' height='100' rx='20'/><text y='70' x='15' font-size='60'>📈</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #0f0c29; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      overflow-y: auto;
      padding: 20px 0;
      padding-top: env(safe-area-inset-top);
    }
    .bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-particles span { position: absolute; width: 4px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 50%; animation: float linear infinite; }
    @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
    .card { position: relative; z-index: 1; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 28px 28px 24px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s ease; }
    .card:hover { transform: translateY(-2px); }
    .logo { text-align: center; margin-bottom: 18px; }
    .logo svg { width: 36px; height: 36px; margin-bottom: 4px; }
    .logo h1 { font-size: 18px; font-weight: 700; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #9ca3af; margin-bottom: 4px; }
    .field .input-wrap { position: relative; display: flex; align-items: center; }
    .field .prefix { position: absolute; left: 12px; font-size: 14px; color: #6b7280; pointer-events: none; transition: color 0.2s; }
    .field input { width: 100%; padding: 10px 12px 10px 28px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #f3f4f6; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .field input:focus { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.15); }
    .field input:focus ~ .prefix, .field input:not(:placeholder-shown) ~ .prefix { color: #a78bfa; }
    .field input::placeholder { color: #4b5563; }
    .btn { width: 100%; padding: 12px; margin-top: 4px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #7c3aed, #3b82f6); color: #fff; letter-spacing: 0.5px; transition: transform 0.15s, box-shadow 0.2s; position: relative; overflow: hidden; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.4); }
    .btn:active { transform: scale(0.98); }
    .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%); transform: translateX(-100%); transition: transform 0.5s; }
    .btn:hover::after { transform: translateX(100%); }
    .result { margin-top: 16px; padding: 16px; border-radius: 14px; text-align: center; opacity: 0; transform: translateY(12px) scale(0.97); transition: opacity 0.4s ease, transform 0.4s ease; display: none; }
    .result.show { display: block; opacity: 1; transform: translateY(0) scale(1); }
    .result.profit { background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(52,211,153,0.08)); border: 1px solid rgba(16,185,129,0.25); }
    .result.loss { background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(248,113,113,0.08)); border: 1px solid rgba(239,68,68,0.25); }
    .result.neutral { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .result-icon { font-size: 28px; margin-bottom: 4px; }
    .result-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 6px; }
    .profit .result-label { color: #34d399; } .loss .result-label { color: #f87171; } .neutral .result-label { color: #9ca3af; }
    .result-amount { font-size: 26px; font-weight: 800; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
    .profit .result-amount { color: #34d399; } .loss .result-amount { color: #f87171; } .neutral .result-amount { color: #d1d5db; }
    .result-pct { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
    .profit .result-pct { color: #6ee7b7; } .loss .result-pct { color: #fca5a5; } .neutral .result-pct { color: #9ca3af; }
    .result-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-box { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px; }
    .detail-box .dl { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-box .dv { font-size: 13px; font-weight: 600; color: #d1d5db; margin-top: 1px; }
    .error-msg { color: #f87171; font-size: 12px; text-align: center; margin-top: 8px; opacity: 0; transition: opacity 0.3s; }
    .error-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg-particles" id="particles"></div>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none"><rect x="4" y="28" width="8" height="16" rx="2" fill="#7c3aed" opacity="0.7"/><rect x="16" y="18" width="8" height="26" rx="2" fill="#3b82f6" opacity="0.8"/><rect x="28" y="8" width="8" height="36" rx="2" fill="#60a5fa" opacity="0.9"/><path d="M8 26L20 16L32 6L44 2" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="44" cy="2" r="3" fill="#a78bfa"/></svg>
      <h1>Stock P&amp;L Calculator</h1>
      <p>Calculate your profit or loss instantly</p>
    </div>
    <div class="field"><label>Investment Amount</label><div class="input-wrap"><input type="number" id="investment" placeholder="0.00" step="any" min="0"><span class="prefix">$</span></div></div>
    <div class="field"><label>Purchase Price per Share</label><div class="input-wrap"><input type="number" id="buyPrice" placeholder="0.00" step="any" min="0"><span class="prefix">$</span></div></div>
    <div class="field"><label>Current Price per Share</label><div class="input-wrap"><input type="number" id="currentPrice" placeholder="0.00" step="any" min="0"><span class="prefix">$</span></div></div>
    <button class="btn" id="calcBtn">Calculate P&amp;L</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="result" id="result">
      <div class="result-icon" id="resIcon"></div>
      <div class="result-label" id="resLabel"></div>
      <div class="result-amount" id="resAmount"></div>
      <div class="result-pct" id="resPct"></div>
      <div class="result-details">
        <div class="detail-box"><div class="dl">Shares Held</div><div class="dv" id="resShares">-</div></div>
        <div class="detail-box"><div class="dl">Current Value</div><div class="dv" id="resValue">-</div></div>
      </div>
    </div>
  </div>
  <script>
    (()=>{const c=document.getElementById('particles');for(let i=0;i<30;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.animationDuration=(6+Math.random()*10)+'s';s.style.animationDelay=Math.random()*8+'s';s.style.width=s.style.height=(2+Math.random()*4)+'px';c.appendChild(s);}})();
    const $=id=>document.getElementById(id);
    const fmt=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    $('calcBtn').addEventListener('click',calculate);
    document.addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});
    function calculate(){
      const errEl=$('errorMsg'),resEl=$('result');
      errEl.classList.remove('show');resEl.classList.remove('show','profit','loss','neutral');
      const investment=parseFloat($('investment').value),buyPrice=parseFloat($('buyPrice').value),currentPrice=parseFloat($('currentPrice').value);
      if([investment,buyPrice,currentPrice].some(v=>isNaN(v)||v<0)){errEl.textContent='Please enter valid positive numbers for all fields.';errEl.classList.add('show');return;}
      if(buyPrice===0){errEl.textContent='Purchase price cannot be zero.';errEl.classList.add('show');return;}
      const shares=investment/buyPrice,currentValue=shares*currentPrice,plDollar=currentValue-investment,plPct=((currentPrice-buyPrice)/buyPrice)*100;
      const isProfit=plDollar>0,isLoss=plDollar<0,type=isProfit?'profit':isLoss?'loss':'neutral';
      $('resIcon').textContent=isProfit?'\u{1F4C8}':isLoss?'\u{1F4C9}':'\u2796';
      $('resLabel').textContent=isProfit?'Total Profit':isLoss?'Total Loss':'Break Even';
      $('resAmount').textContent=(plDollar>=0?'+$':'-$')+fmt(Math.abs(plDollar));
      $('resPct').textContent=(plPct>=0?'+':'')+fmt(plPct)+'%';
      $('resShares').textContent=fmt(shares);
      $('resValue').textContent='$'+fmt(currentValue);
      resEl.classList.add(type);requestAnimationFrame(()=>resEl.classList.add('show'));
    }
  </script>
</body>
</html>
